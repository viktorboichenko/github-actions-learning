# Automatically rebase PRs marked with --autorebase label to the latest main commit
name: autorebase-on-main
on:
  push:
    branches:
      - main

jobs:
  autorebase:
    name: Rebase Open PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (Optional but recommended)
        uses: actions/checkout@v4

      - name: Rebase PRs via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all open PRs with the '--autorebase' label..."
          
          # 1. Use the GitHub CLI to find the PR numbers
          PR_NUMBERS=$(gh pr list --state open --label "--autorebase" --json number --jq '.[].number')
          
          # 2. Check if the list is empty
          if [ -z "$PR_NUMBERS" ]; then
            echo "No open PRs found with the '--autorebase' label. Exiting cleanly."
            exit 0
          fi
          
          # Convert the newline-separated list to a single line for cleaner logging
          PR_LIST_INLINE=$(echo "$PR_NUMBERS" | tr '\n' ' ')
          echo "Target PRs to rebase: $PR_LIST_INLINE"
          
          # 3. Loop through each PR number
          for PR in $PR_NUMBERS; do
            echo "----------------------------------------"
            echo "Attempting to rebase PR #$PR..."
          
            # 4. Attempt the rebase safely. 
            # We temporarily turn off 'exit-on-error' (set +e) so a failed rebase doesn't crash the whole job.
            set +e 
            # 2>&1 redirects standard error into standard output so we can capture both
            OUTPUT=$(gh pr update-branch "$PR" --rebase 2>&1)
            EXIT_CODE=$?
            set -e # Turn 'exit-on-error' back on for safety
          
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Successfully rebased PR #$PR."
            else
              echo "⚠️ Skipping PR #$PR. Rebase failed."
              echo "❌ Error Details: $OUTPUT"
            fi
          done
          echo "----------------------------------------"
          echo "Autorebase cycle complete!"