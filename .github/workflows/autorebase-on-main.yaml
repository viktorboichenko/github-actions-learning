# Automatically rebase PRs marked with --autorebase label to the latest main commit
name: autorebase-on-main
on:
  push:
    branches:
      - main

jobs:
  autorebase:
    name: Rebase Open PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (Optional but recommended)
        uses: actions/checkout@v4

      - name: Rebase PRs via GitHub CLI
        env:
          # Use GITHUB_TOKEN or a custom Personal Access Token (PAT)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all open PRs with the '--autorebase' label..."
          
          # 1. Use the GitHub CLI to find the PR numbers and output them as a list
          PR_NUMBERS=$(gh pr list --state open --label "--autorebase" --json number --jq '.[].number')
          
          # 2. Check if the list is empty
          if [ -z "$PR_NUMBERS" ]; then
            echo "No open PRs found with the '--autorebase' label. Exiting cleanly."
            exit 0
          fi
          
          # 3. Loop through each PR number
          for PR in $PR_NUMBERS; do
            echo "----------------------------------------"
            echo "Attempting to rebase PR #$PR..."
          
            # 4. Attempt the rebase. 
            # If it succeeds, it prints success. 
            # If it fails (due to merge conflicts), it catches the error, prints a warning, and moves to the next PR.
            if gh pr update-branch "$PR" --rebase; then
              echo "✅ Successfully rebased PR #$PR."
            else
              echo "⚠️ Skipping PR #$PR. This is usually due to merge conflicts requiring manual resolution."
            fi
          done
          echo "----------------------------------------"
          echo "Autorebase cycle complete!"
