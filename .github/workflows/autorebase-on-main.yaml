# Automatically rebase PRs marked with --autorebase label to the latest main commit
name: autorebase-on-main
on:
  push:
    branches:
      - main

jobs:
  autorebase:
    name: Rebase Open PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebase PRs via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all open PRs with the '--autorebase' label..."
          
          # 1. Fetch PR numbers directly into a Bash array for safer iteration
          mapfile -t PR_ARRAY < <(gh pr list \
            --state open \
            --label "--autorebase" \
            --json number \
            --jq '.[].number')
          
          # 2. Check if the array is empty
          if [ ${#PR_ARRAY[@]} -eq 0 ]; then
            echo "No open PRs found with the '--autorebase' label. Exiting cleanly."
            exit 0
          fi
          
          echo "Target PRs to rebase: ${PR_ARRAY[*]}"
          
          # 3. Loop through each PR number in the array
          for PR in "${PR_ARRAY[@]}"; do
            # Group logs in the GitHub Actions UI for better readability
            echo "::group::Attempting to rebase PR #$PR"
          
            # 4. Attempt the rebase safely using an inline 'if' statement
            # This captures the output and checks the exit code
            if OUTPUT=$(gh pr update-branch "$PR" --rebase 2>&1); then
              echo "✅ Successfully rebased PR #$PR."
              gh pr comment "$PR" --body "✅ Successfully rebased by **${{ github.workflow }}**"
            else
              echo "⚠️ Rebase failed for PR #$PR. Merge conflicts likely."
              echo "❌ Error Details: $OUTPUT"
              gh pr comment "$PR" --body "❌ **Autorebase Failed:** Merge conflicts detected. Please resolve manually."
          
              # Optional but recommended: Remove the label so it doesn't keep failing on every push
              gh pr edit "$PR" --remove-label "--autorebase"
              echo "Removed '--autorebase' label from PR #$PR."
            fi
          
            echo "::endgroup::"
          done
          
          echo "Autorebase cycle complete!"